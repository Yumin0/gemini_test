<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI 對話助理</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #f0f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background .3s;
    }

    /* ── Dark Mode ── */
    body.dark {
      background: #1a1a2e;
    }
    body.dark .chat-wrapper {
      background: #16213e;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    body.dark .chat-body::-webkit-scrollbar-thumb { background: #444; }
    body.dark .msg.model .bubble {
      background: #0f3460; color: #e0e0e0;
    }
    body.dark .msg.model .avatar { background: #1a4a1a; color: #34a853; }
    body.dark .typing-bubble { background: #0f3460; }
    body.dark .dot { background: #6b7280; }
    body.dark .welcome { color: #6b7280; }
    body.dark .welcome h2 { color: #9ca3af; }
    body.dark .chat-footer {
      border-top-color: #2d3748;
      background: #16213e;
    }
    body.dark #userInput {
      background: #0f3460;
      border-color: #2d3748;
      color: #e0e0e0;
    }
    body.dark #userInput:focus { border-color: #4285f4; }
    body.dark #userInput::placeholder { color: #6b7280; }
    body.dark .hint { color: #6b7280; }
    body.dark .error-bubble { background: #3b1a1a; color: #f87171; }

    /* ── 主容器 ── */
    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .3s, box-shadow .3s;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .logo {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header .title { font-size: 18px; font-weight: 600; }
    .chat-header .subtitle { font-size: 12px; opacity: .8; margin-top: 2px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .clear-btn, .theme-btn {
      background: rgba(255,255,255,.2);
      border: none; color: #fff;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; cursor: pointer;
      transition: background .2s;
    }
    .clear-btn:hover, .theme-btn:hover { background: rgba(255,255,255,.35); }

    /* ── 訊息區 ── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar { width: 6px; }
    .chat-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* ── 訊息泡泡 ── */
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user  { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.user  .avatar { background: #4285f4; color: #fff; }
    .msg.model .avatar { background: #e8f5e9; color: #34a853; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      transition: background .3s, color .3s;
    }
    .msg.user  .bubble {
      background: #4285f4; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.model .bubble {
      background: #f1f3f4; color: #202124;
      border-bottom-left-radius: 4px;
    }

    /* ── 打字動畫 ── */
    .typing-bubble {
      background: #f1f3f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
      transition: background .3s;
    }
    .dot {
      width: 8px; height: 8px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-8px); }
    }

    /* ── 歡迎訊息 ── */
    .welcome {
      text-align: center;
      color: #9aa0a6;
      font-size: 14px;
      margin: auto 0;
      padding: 20px;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 10px; }
    .welcome h2 { color: #5f6368; font-size: 20px; margin-bottom: 8px; }

    /* ── 輸入區 ── */
    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      transition: background .3s, border-color .3s;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      border: 2px solid #e8eaed;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color .2s, background .3s, color .3s;
      line-height: 1.5;
    }
    #userInput:focus { border-color: #4285f4; }
    #sendBtn {
      width: 48px; height: 48px;
      background: #4285f4;
      border: none; border-radius: 50%;
      color: #fff; font-size: 20px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
    }
    #sendBtn:hover  { background: #3367d6; }
    #sendBtn:active { transform: scale(.92); }
    #sendBtn:disabled { background: #ccc; cursor: not-allowed; }

    .hint { font-size: 12px; color: #9aa0a6; text-align: center; margin-top: 8px; }

    /* ── 錯誤訊息 ── */
    .error-bubble {
      background: #fce8e6; color: #c5221f;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      transition: background .3s, color .3s;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="logo">✨</div>
    <div>
      <div class="title">Gemini AI 對話助理</div>
      <div class="subtitle">由 Gemini 2.5 Flash 驅動</div>
    </div>
    <div class="header-actions">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換深色/淺色模式">🌙 深色模式</button>
      <button class="clear-btn" onclick="clearChat()">🗑 清除對話</button>
    </div>
  </div>

  <!-- 訊息顯示區 -->
  <div class="chat-body" id="chatBody">
    <div class="welcome" id="welcomeMsg">
      <div class="icon">🤖</div>
      <h2>你好！我是 Gemini AI 助理</h2>
      <p>有什麼我可以幫你的嗎？請在下方輸入訊息開始對話。</p>
    </div>
  </div>

  <!-- 輸入區 -->
  <div class="chat-footer">
    <div class="input-row">
      <textarea id="userInput" rows="1"
        placeholder="輸入訊息… (Enter 送出 / Shift+Enter 換行)"
        oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()" title="送出">➤</button>
    </div>
    <div class="hint">⚠️ 請先將 GAS_WEB_APP_URL 替換為你的 GAS 部署網址</div>
  </div>

</div>

<script>
  // ======================================================
  //  ⬇️  將下面這行換成你的 GAS Web App 部署網址
  // ======================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMuXTCnuT76BmHem0Ty67J9JqMs6meNL6CklOaKTHJrvblWUU-7DqahKpunO6QOlph/exec';
  // ======================================================

  let conversationHistory = [];  // 儲存對話歷史（讓 AI 有記憶）

  // ── 深色模式切換 ──
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    const btn = document.getElementById('themeBtn');
    btn.textContent = isDark ? '☀️ 淺色模式' : '🌙 深色模式';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  // 初始化主題（讀取上次設定）
  (function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️ 淺色模式';
    }
  })();

  // ── 自動調整 textarea 高度 ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Enter 送出 / Shift+Enter 換行 ──
  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── 送出訊息 ──
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text  = input.value.trim();
    if (!text) return;

    // 移除歡迎畫面
    const welcome = document.getElementById('welcomeMsg');
    if (welcome) welcome.remove();

    // 顯示使用者訊息
    appendMessage('user', text);

    // 把使用者訊息加入歷史
    conversationHistory.push({ role: 'user', content: text });

    // 清空輸入框
    input.value = '';
    input.style.height = 'auto';

    // 禁用按鈕
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    // 顯示打字動畫
    const typingId = showTyping();

    try {
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' }, // GAS 需用 text/plain 避免 CORS preflight
        body:    JSON.stringify({
          message: text,
          history: conversationHistory.slice(0, -1)  // 歷史（不含本次）
        })
      });

      const data = await res.json();

      removeTyping(typingId);

      if (data.success) {
        appendMessage('model', data.reply);
        // 把 AI 回覆加入歷史
        conversationHistory.push({ role: 'model', content: data.reply });
      } else {
        appendError('API 錯誤：' + (data.error || '未知錯誤'));
        conversationHistory.pop(); // 移除失敗的使用者訊息
      }
    } catch (err) {
      removeTyping(typingId);
      appendError('連線失敗，請確認 GAS 網址是否正確。\n' + err.message);
      conversationHistory.pop();
    }

    btn.disabled = false;
    input.focus();
    scrollToBottom();
  }

  // ── 新增訊息泡泡 ──
  function appendMessage(role, text) {
    const body   = document.getElementById('chatBody');
    const div    = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '✨'}</div>
      <div class="bubble">${escapeHtml(text)}</div>`;
    body.appendChild(div);
    scrollToBottom();
  }

  // ── 顯示打字動畫 ──
  function showTyping() {
    const body = document.getElementById('chatBody');
    const div  = document.createElement('div');
    div.className = 'msg model';
    div.id = 'typing-' + Date.now();
    div.innerHTML = `
      <div class="avatar">✨</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    body.appendChild(div);
    scrollToBottom();
    return div.id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── 顯示錯誤 ──
  function appendError(msg) {
    const body = document.getElementById('chatBody');
    const div  = document.createElement('div');
    div.innerHTML = `<div class="error-bubble">⚠️ ${escapeHtml(msg)}</div>`;
    body.appendChild(div);
    scrollToBottom();
  }

  // ── 清除對話 ──
  function clearChat() {
    conversationHistory = [];
    const body = document.getElementById('chatBody');
    body.innerHTML = `
      <div class="welcome" id="welcomeMsg">
        <div class="icon">🤖</div>
        <h2>你好！我是 Gemini AI 助理</h2>
        <p>有什麼我可以幫你的嗎？請在下方輸入訊息開始對話。</p>
      </div>`;
  }

  // ── 工具函式 ──
  function scrollToBottom() {
    const body = document.getElementById('chatBody');
    body.scrollTop = body.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
